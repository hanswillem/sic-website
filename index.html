<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SIC</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css?v=4" />
    </head>
    <body>
        <div id="video-bg">
            <video autoplay muted loop playsinline>
                <source src="video.mp4" type="video/mp4" />
            </video>
        </div>
        <main>
            <section id="container" aria-label="SIC">
                <h1 id="sic">[sic]</h1>
            </section>
            <section id="projects" aria-label="Projects">
                <div class="project-grid">
                    <article class="project">
                        <a
                            href="projects/01/"
                            target="_blank"
                            rel="noopener"
                            class="project-link"
                        >
                            <div class="project-square">
                                <img
                                    src="projects/01/mouse_retina.gif"
                                    alt="Mouse retina"
                                    class="project-image"
                                />
                            </div>
                        </a>
                        <p class="project-title">/mouse_retina</p>
                    </article>
                    <article class="project">
                        <a
                            href="projects/02/"
                            target="_blank"
                            rel="noopener"
                            class="project-link"
                        >
                            <div class="project-square">
                                <img
                                    src="projects/02/tremor.gif"
                                    alt="Parkinson tremor"
                                    class="project-image"
                                />
                            </div>
                        </a>
                        <p class="project-title">/parkinson_tremor</p>
                    </article>
                    <article class="project">
                        <div class="project-square"></div>
                        <p class="project-title">/project_03</p>
                    </article>
                    <article class="project">
                        <div class="project-square"></div>
                        <p class="project-title">/project_04</p>
                    </article>
                    <article class="project">
                        <div class="project-square"></div>
                        <p class="project-title">/project_05</p>
                    </article>
                    <article class="project">
                        <div class="project-square"></div>
                        <p class="project-title">/project_06</p>
                    </article>
                    <article class="project">
                        <div class="project-square"></div>
                        <p class="project-title">/project_07</p>
                    </article>
                    <article class="project">
                        <div class="project-square"></div>
                        <p class="project-title">/project_08</p>
                    </article>
                    <article class="project">
                        <div class="project-square"></div>
                        <p class="project-title">/project_09</p>
                    </article>
                    <article class="project">
                        <div class="project-square"></div>
                        <p class="project-title">/project_10</p>
                    </article>
                </div>
            </section>
        </main>
        <script>
            const container = document.getElementById("container");
            const sic = document.getElementById("sic");

            let characterWidth = 20;

            const measureCharWidth = () => {
                const canvas = document.createElement("canvas");
                const ctx = canvas.getContext("2d");
                ctx.font = '64px "Roboto Mono", monospace';
                characterWidth = ctx.measureText("i").width;
            };

            const updateText = () => {
                const style = getComputedStyle(container);
                const width =
                    container.offsetWidth -
                    parseFloat(style.paddingLeft) -
                    parseFloat(style.paddingRight);
                const fixedChars = 4; // [, s, c, ]

                const numberOfIs = Math.max(
                    1,
                    Math.floor(
                        (width - fixedChars * characterWidth) / characterWidth,
                    ),
                );

                sic.textContent = `[s${"i".repeat(numberOfIs)}c]`;
            };

            document.fonts.ready.then(() => {
                measureCharWidth();
                const observer = new ResizeObserver(updateText);
                observer.observe(container);
                updateText();
            });
        </script>
    </body>
</html>
